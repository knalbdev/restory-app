name: restory_app
description: "Restory App - Restaurant recommendation app for Dicoding Flutter Fundamental submission."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.1
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  sqflite: ^2.4.1
  path: ^1.9.0
  shared_preferences: ^2.3.3
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.9.0
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.12

flutter:
  uses-material-design: true

  assets:
    - assets/images/
